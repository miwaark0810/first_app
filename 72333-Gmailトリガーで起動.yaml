# オブジェクトを作成
+create_object_1:
  action>: CreateObject
  display_name>: 'オブジェクトを作成'
  object: ${gmailObject}
  private: false
  meta:
    action:
      disabled: false

# 添付ファイルをダウンロード
+gmail_get_attachments_1:
  action>: GmailGetAttachments
  display_name>: '添付ファイルをダウンロード'
  mail: +create_object_1
  ignoreError: false
  private: false
  meta:
    action:
      disabled: false

# ダウンロードファイル一覧
+get_download_files_1:
  action>: GetDownloadFiles
  display_name>: 'ダウンロードファイル一覧'
  order: ASC
  sort_by: FILENAME
  private: false
  meta:
    action:
      disabled: false

# 変数に保存
+store_value_1:
  action>: StoreValue
  display_name>: '変数に保存'
  key: download_files
  value: +get_download_files_1
  setIfNotDefined: false
  private: false
  meta:
    action:
      disabled: false

# ファイルを保存
+save_file_1:
  action>: SaveFile
  display_name>: 'ファイルを保存'
  provider: local
  filename: ${download_files[0]}
  createPath: false
  private: false
  meta:
    action:
      disabled: false

# テキストを作成
+text_1:
  action>: Text
  display_name>: 'テキストを作成'
  text: '登録するアクションを実行する'
  private: false
  meta:
    action:
      disabled: false