# ログインページを開く
+open_browser_1:
  action>: OpenBrowser
  url: https://console.devk8s.com/users/sign_in
  lang: ja-JP
  timeZone: Asia/Tokyo
  headless: true
  confirm: true
  windowSize: 1920 x 1080
  useShadowDomSelector: false
  private: false

# ページ内でJavaScriptを実行する
+inject_script_1:
  action>: InjectScript
  browser: "+open_browser_1"
  code: window.location.href = 'https://tutorial-staging:password9876@console.devk8s.com/users/sign_in';
  returnValue: false
  private: false

# URLへ遷移
+go_to_1:
  action>: GoTo
  browser: "+inject_script_1"
  url: https://console.devk8s.com/users/sign_in
  private: false

# 強制終了
+kill_attempt_1:
  action>: KillAttempt
  message: ''
  private: false

# 繰り返し
+loop_1:
  loop>: 2
  _do:

    # Emailを入力
    +type_text_4:
      action>: TypeText
      browser: "+open_browser_1"
      selector: "#app > div > div > div > div > div.card__text.pt-0 > form > div:nth-child(2)
        > div.input-group__input > input[type=email]"
      text: kaihatsu+admin@robokura.com
      clearValue: false
      ignoreError: false
      private: false

    # パスワード入力
    +type_password_1:
      action>: TypePassword
      browser: "+open_browser_1"
      selector: "#app > div > div > div > div > div.card__text.pt-0 > form > div:nth-child(3)
        > div.input-group__input > input[type=password]"
      password: "********"
      waitAfter: 3000
      ignoreError: false
      private: false

    # ログインボタンをクリック
    +click_5:
      action>: Click
      browser: "+open_browser_1"
      selector: "#app > div > div > div > div > div.card__text.pt-0 > form > div.layout.justify-center
        > div > button"
      confirm: true
      waitAfter: 5000
      ignoreError: false
      timeout: 10000
      private: false

    # クリック_TOPを押下
    +click_1:
      action>: Click
      browser: "+click_5"
      selector: div.menu__activator > button.btn--flat
      confirm: true
      waitAfter: 5000
      ignoreError: false
      timeout: 10000
      private: false

    # クリック_ログアウトを押下
    +click_2:
      action>: Click
      browser: "+click_1"
      selector: div.list--dense > div:last-child
      confirm: true
      waitAfter: 5000
      ignoreError: false
      timeout: 10000
      private: false

    # スクリーンショットを撮る
    +take_screenshot_1:
      action>: TakeScreenshot
      browser: "+click_2"
      full_page: false
      type: png
      private: false