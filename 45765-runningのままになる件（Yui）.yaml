# ブラウザを開く  ログインページ
+open_browser_1:
  action>: OpenBrowser
  url: 'https://provider.yui.gift/'
  lang: 'ja-JP'
  headless: true

# 文字入力　　　ID
+type_text_1:
  action>: TypeText
  browser: +open_browser_1
  selector: '#email-input'
  text: ${mail}
  clearValue: false
  ignoreError: true

# 文字入力　　　パスワード
+type_text_2:
  action>: TypeText
  browser: +type_text_1
  selector: '#password-input'
  text: ${password}
  clearValue: false
  ignoreError: true

# ログインボタンクリック　
+click_1:
  action>: Click
  browser: +type_text_2
  selector: '.LoaderButton_button__vXlOP'
  confirm: true
  waitAfter: 5000
  ignoreError: true
  timeout: 30000

# 発送要求一覧へ遷移
+go_to_2:
  action>: GoTo
  browser: +click_1
  url: 'https://provider.yui.gift/shippings'

# データを取得する
+data_store_get_1:
  action>: DataStoreGet
  key: yui_hasso

# 変数に保存
+store_value_3:
  action>: StoreValue
  key: yui_hasso
  value: +data_store_get_1

# 各要素について繰り返す
+for_each_2:
  for_each>:
    hasso: ${y_hasso}
  _do:

    # 変数に保存
    +store_value_2:
      action>: StoreValue
      key: hasso_kai
      value: ${hasso[0].trim()}

    # 繰り返しを終了する
    +break_if_1:
      break_if>: ${yui_hasso == hasso_kai}

    # Slackでメッセージを送信
    +send_slack_message_2:
      action>: SendSlackMessage
      provider: slack_43fc09f3f044d594aef4
      channel: '#automation_order'
      text: 'Yui(${hasso_kai})発送登録開始'
      send_select: false
      response_message: false
      meta:
        display:
          provider:
            type: chip
            label: 'Slack (UpSwell, Inc.)'
            icon: slack

    # テキストを作成
    +text_1:
      action>: Text
      text: 'https://provider.yui.gift/shippings/${hasso_kai}'

    # URLへ遷移   該当の注文へ
    +go_to_1:
      action>: GoTo
      browser: +go_to_2
      url: 'https://provider.yui.gift/shippings/${hasso_kai}'
      waitAfter: 3500

    # スクリーンショットを撮る
    +take_screenshot_1:
      action>: TakeScreenshot
      browser: +go_to_1
      full_page: true
      type: png
      waitBefore: 1000

    # 要素を見つける
    +find_element_1:
      action>: FindElement
      browser: +go_to_1
      find_by: contains
      value: '発送済みにする'
      timeout: 4000
      visible: true

    # 変数に保存
    +store_value_1:
      action>: StoreValue
      key: done_mark
      value: +find_element_1

    # 真のとき
    +if_1:
      if>: ${!!done_mark}
      _do:

        # クリック
        +click_2:
          action>: Click
          browser: +go_to_1
          selector: ${done_mark}
          confirm: true
          waitAfter: 2000
          ignoreError: true
          timeout: 3000

        # スクリーンショットを撮る
        +take_screenshot_2:
          action>: TakeScreenshot
          browser: +click_2
          full_page: false
          type: png

        # Slackでメッセージを送信
        +send_slack_message_1:
          action>: SendSlackMessage
          provider: slack_43fc09f3f044d594aef4
          channel: '#automation_order'
          text: 'Yui(${hasso_kai})発送登録完了'
          send_select: false
          response_message: false
          meta:
            display:
              provider:
                type: chip
                label: 'Slack (UpSwell, Inc.)'
                icon: slack

# データを保存する
+data_store_save_1:
  action>: DataStoreSave
  key: yui_hasso
  value: ${y_hasso[0][0].trim()}