# ファイルを取得
+get_file_2:
  action>: GetFile
  provider: gdrive_02f65eb838b493f35dee
  filename: ${fileList[fileListNo]}
  meta:
    display:
      provider:
        type: chip
        label: 'Google Drive (ayumu.niwa@tutorial.co.jp)'
        icon: googledrive

# ワークシートを選択
+select_sheet_2:
  action>: SelectSheet
  filename: +get_file_2
  sheetname: '基本商品マスタ'
  middleware: xlsx

# 変数に保存
+store_value_2:
  action>: StoreValue
  key: sheetInfo
  value: +select_sheet_2

# 変数に保存
+store_value_5:
  action>: StoreValue
  key: lastRow
  value: ${sheetInfo["rows"]}

# 変数に保存
+store_value_1:
  action>: StoreValue
  key: readloopCount
  value: ${Math.ceil((lastRow - 4)/2000)}

# 変数に保存
+store_value_4:
  action>: StoreValue
  key: array
  value: []

# 繰り返し
+loop_1:
  loop>: ${readloopCount}
  _do:

    # 真のとき（最後の行ではないとき）
    +if_2:
      if>: ${ (i +1) !== readloopCount}
      _do:

        # 範囲を読み込む
        +read_range_1:
          action>: ReadRange
          worksheet: +select_sheet_2
          range: 'A${i*2000 +5}:FY${(i+1)*2000 +4}'
          middleware: xlsx

        # 変数に保存
        +store_value_3:
          action>: StoreValue
          key: sheetRange
          value: +read_range_1

    # 真のとき（最後の行のとき）
    +if_1:
      if>: ${ (i +1) === readloopCount}
      _do:

        # 範囲を読み込む
        +read_range_2:
          action>: ReadRange
          worksheet: +select_sheet_2
          range: 'A${i*2000 +5}:FY${lastRow}'
          middleware: xlsx

        # 変数に保存
        +store_value_6:
          action>: StoreValue
          key: sheetRange
          value: +read_range_2

    # スクリプトを実行
    +run_script_2:
      action>: RunScript
      code: "sheetRange.forEach(row => {\n  array.push(row);\n});\nreturn array;\n"

    # 変数に保存
    +store_value_7:
      action>: StoreValue
      key: array
      value: +run_script_2

    # 待機する
    +wait_1:
      action>: Wait
      time: 3000

# ファイルを取得
+get_file_1:
  action>: GetFile
  provider: local
  filename: ${fileId}
  meta:
    display: null

# ワークシートを選択
+select_sheet_1:
  action>: SelectSheet
  filename: +get_file_1
  sheetname: '上書き用'
  middleware: xlsx

# 変数に保存
+store_value_8:
  action>: StoreValue
  key: writeloopCount
  value: ${Math.ceil(array.length / 10000)}

# 繰り返し
+loop_2:
  loop>: ${writeloopCount}
  _do:

    # スクリプトを実行（inputArrayから書き込む配列を抽出する）
    +run_script_1:
      action>: RunScript
      code: "return array.slice(i * 10000, (i + 1) * 10000);\n"

    # 範囲に書き込む
    +write_range_1:
      action>: WriteRange
      worksheet: +select_sheet_1
      table: +run_script_1
      celllabel: 'A${writeStartrow}'
      middleware: xlsx

    # ファイルを保存
    +save_file_2:
      action>: SaveFile
      provider: local
      filename: +get_file_1
      createPath: true
      meta:
        display: null

    # 変数に保存
    +store_value_9:
      action>: StoreValue
      key: saveFile
      value: +save_file_2

    # ファイルを削除
    +delete_item_1:
      action>: DeleteItem
      provider: local
      filename: ${fileId}

    # 変数に保存
    +store_value_10:
      action>: StoreValue
      key: fileId
      value: ${saveFile.file_id}

    # 待機する
    +wait_1:
      action>: Wait
      time: 3000

    # 真のとき(最終ループ以外)
    +if_4:
      if>: ${(i+1) !== writeloopCount}
      _do:

        # 変数に保存（書き込み行数）
        +store_value_16:
          action>: StoreValue
          key: writeStartrow
          value: ${10000 + parseInt(writeStartrow)}

    # 真のとき(最終ループの時)
    +if_3:
      if>: ${(i+1) == writeloopCount}
      _do:

        # 変数に保存（書き込み行数）
        +store_value_13:
          action>: StoreValue
          key: writeStartrow
          value: ${array.length - 10000*i + parseInt(writeStartrow)}

# 変数に保存
+store_value_15:
  action>: StoreValue
  key: fileListNo
  value: ${parseInt(fileListNo)+1}

# 真のとき(続きをAddToQueue)
+if_2:
  if>: ${fileListNo < fileList.length}
  _do:

    # スクリプトを実行
    +run_script_2:
      action>: RunScript
      code: "return {\n  fileList: fileList,\n  fileListNo: fileListNo,\n  fileId: fileId,\n  writeStartrow: writeStartrow\n};\n"

    # 変数に保存
    +store_value_12:
      action>: StoreValue
      key: params
      value: +run_script_2

    # ワークフローを実行する
    +add_to_queue_1:
      action>: AddToQueue
      workflow_id: 45327
      params: ${params}

# 真のとき(最後のファイルの時)
+if_1:
  if>: ${fileListNo == fileList.length}
  _do:

    # ファイルを取得
    +get_file_3:
      action>: GetFile
      provider: local
      filename: ${fileId}

    # 日時を取得
    +get_time_1:
      action>: GetTime
      format: 'YYYY-MM-DD-HH-mm'
      timezone: 'Asia/Tokyo'
      relativeTime: ''

    # 変数に保存
    +store_value_14:
      action>: StoreValue
      key: datetime
      value: +get_time_1

    # ファイル名を変更
    +rename_file_1:
      action>: RenameFile
      filename: +get_file_3
      save_as: '${datetime}.xlsx'

    # ファイルを保存
    +save_file_1:
      action>: SaveFile
      provider: gdrive_b2c041f26438f079478e
      filename: +rename_file_1
      directory: 1BBFy9unqs8bF3X_eCmJmn3YFw7znnp4f
      createPath: false
      meta:
        display:
          provider:
            type: chip
            label: 'Google Drive (ryo.nakajima@tutorial.co.jp)'
            icon: googledrive