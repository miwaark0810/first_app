# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  display_name>: 'ブラウザを開く'
  url: null
  lang: 'ja-JP'
  headless: true
  confirm: true
  useShadowDomSelector: false
  private: false
  meta:
    action:
      disabled: false

# クリック
+click_1:
  action>: Click
  display_name>: 'クリック'
  browser: +open_browser_1
  selector: ''
  confirm: true
  ignoreError: true
  timeout: 30000
  private: false
  meta:
    action:
      disabled: false

# ブラウザを閉じる
+close_browser_1:
  action>: CloseBrowser
  display_name>: 'ブラウザを閉じる'
  browser: +click_1
  private: false
  meta:
    action:
      disabled: false