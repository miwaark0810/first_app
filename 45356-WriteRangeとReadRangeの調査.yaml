# ファイルを取得
+get_file_1:
  action>: GetFile
  provider: onedrive_c94bbf3164a8123f6bfb
  filename: '8273E9CCD2EE5742!351'
  meta:
    display:
      provider:
        type: chip
        label: 'Onedrive (kaihatsu@robokura.com)'
        icon: onedrive
      filename:
        label: '20万行のやつ.xlsx'
        icon: text
        type: chip

# ワークシートを選択
+select_sheet_1:
  action>: SelectSheet
  filename: +get_file_1
  sheetname: Sheet1
  middleware: xlsx

# 範囲を読み込む
+read_range_1:
  action>: ReadRange
  worksheet: +select_sheet_1
  range: 'A1:FY100000'
  middleware: xlsx

# 範囲に書き込む
+write_range_1:
  action>: WriteRange
  worksheet: +select_sheet_1
  table: +read_range_1
  celllabel: A200001
  middleware: xlsx