# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  display_name>: 'ブラウザを開く'
  url: 'https://www.yahoo.co.jp/'
  lang: 'ja-JP'
  userAgent: 'Mozilla/5.0 (Macintosh; Intel Mac OS X 10_13_6) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/77.0.3864.0 Safari/537.36'
  headless: true
  confirm: true
  useShadowDomSelector: false
  private: false

# 変数に保存
+store_value_17:
  action>: StoreValue
  display_name>: '変数に保存'
  key: ''
  value: ''
  setIfNotDefined: false
  private: false

# 繰り返し
+loop_1:
  loop>:
    display_name>: '繰り返し'
    times: 500
    private: false
  _do:

    # スクリーンショットを撮る
    +take_screenshot_1:
      action>: TakeScreenshot
      display_name>: 'スクリーンショットを撮る'
      browser: +open_browser_1
      full_page: false
      type: png
      private: false

    # テキストを取得
    +get_text_1:
      action>: GetText
      display_name>: 'テキストを取得'
      browser: +open_browser_1
      selector: '._2j0udhv5jERZtYzddeDwcv:nth-child(1) ._1alzSpTqJzvSVUWqpx82d4'
      ignoreError: true
      private: false

    # 検索して置換
    +replace_text_1:
      action>: ReplaceText
      display_name>: '検索して置換'
      text: +get_text_1
      find: '/D'
      use_regex: true
      replace_with: ''
      private: false

    # テキストを作成
    +text_1:
      action>: Text
      display_name>: 'テキストを作成'
      text: 'a${i}'
      private: false

    # 変数に保存
