# Slackでメッセージを送信
+send_slack_message_1:
  action>: SendSlackMessage
  provider: slack_43fc09f3f044d594aef4
  channel: '#automation_order'
  text: 'NE　ギフト系注文、出荷確定処理開始'
  send_select: false
  response_message: false
  meta:
    display:
      provider:
        type: chip
        label: 'Slack (UpSwell, Inc.)'
        icon: slack

# エラーを捕捉する
+try_1:
  try>: NE_error
  _do:

    # ログイン画面
    +open_browser_1:
      action>: OpenBrowser
      url: 'https://base.next-engine.org/users/sign_in/'
      lang: 'ja-JP'
      headless: true

    # 文字入力
    +type_text_1:
      action>: TypeText
      browser: +open_browser_1
      selector: '#user_login_code'
      text: 'dev@upswell.jp'
      clearValue: false
      ignoreError: true

    # 文字入力
    +type_text_2:
      action>: TypeText
      browser: +type_text_1
      selector: '#user_password'
      text: 'Upsw2020!'
      clearValue: false
      ignoreError: true

    # クリック  login
    +click_1:
      action>: Click
      browser: +type_text_2
      selector: '.btn-primary'
      confirm: true
      waitAfter: 3000
      ignoreError: true
      timeout: 30000

    # クリック　　　本番開く（GOTOでは行けない）
    +click_3:
      action>: Click
      browser: +click_1
      selector: 'div#footer-app-launcher ul > li:nth-child(1) > a'
      confirm: true
      waitAfter: 2000
      ignoreError: true
      timeout: 30000

    # 開いているタブを表示
    +show_tabs_1:
      action>: ShowTabs
      browser: +click_3

    # タブを切り替える  管理画面トップにタブ変更
    +switch_tab_1:
      action>: SwitchTab
      browser: +click_3
      tab: 1

    # URLへ遷移   ポップアップでるのでトップページへ移動して回避
    +go_to_1:
      action>: GoTo
      browser: +switch_tab_1
      url: 'https://main.next-engine.com/Usertop'

    # テキストを作成
    +text_1:
      action>: Text
      text: "\nhttps://ne104.next-engine.com/Usertop"

    # 出荷済みクリック
    +click_2:
      action>: Click
      browser: +click_3
      selector: 'tr:nth-child(9) > td:nth-child(1) > a'
      confirm: true
      waitBefore: 1500
      waitAfter: 5000
      ignoreError: false
      timeout: 30000

    # ページ内でJavaScriptを実行する
    +inject_script_1:
      action>: InjectScript
      browser: +click_2
      code: "location.reload();\n"
      returnValue: false

    # スクリーンショットを撮る
    +take_screenshot_1:
      action>: TakeScreenshot
      browser: +click_2
      full_page: true
      type: png
      waitBefore: 12000

    # 選択肢を選ぶ
    +select_option_1:
      action>: SelectOption
      browser: +click_2
      selector: '#jyuchu_result_section > table > tbody > tr > td:nth-child(3) > select'
      value: 1000
      text: ''
      confirm: true
      waitBefore: 3000
      waitAfter: 2000
      ignoreError: true

    # スクレイピング   案件の有無確認
    +scrape_page_1:
      action>: ScrapePage
      browser: +click_2
      selector: '#searchJyuchu_tablene_table > tbody'
      text_only: true
      ignoreError: true

    # 変数に保存　　
    +store_value_1:
      action>: StoreValue
      key: checker
      value: +scrape_page_1

    # 真のとき    対象案件がある時
    +if_1:
      if>: ${checker.length > 0}
      _do:

        # DLクリック
        +click_4:
          action>: Click
          browser: +click_2
          selector: 'a#searchJyuchu_table_dl_lnk'
          confirm: true
          waitBefore: 6500
          ignoreError: true
          timeout: 30000
          waitForDownload: true

        # ダウンロードファイル一覧
        +get_download_files_1:
          action>: GetDownloadFiles
          order: ASC
          sort_by: FILENAME

        # CSVを読み込む
        +read_c_s_v_1:
          action>: ReadCSV
          filename: +get_download_files_1
          headers: true

        # 変数に保存
        +store_value_2:
          action>: StoreValue
          key: hasso
          value: +read_c_s_v_1

        # スクリプトを実行＞＞受注コードと媒体情報取得 　　
        +run_script_1:
          action>: RunScript
          code: "let final = hasso.map(s => [\n  s[hasso[0].indexOf(\"受注番号\")],\n  s[hasso[0].indexOf(\"備考\")],\n  s[hasso[0].indexOf(\"発送伝票番号\")],\n  s[hasso[0].indexOf(\"出荷確定日\")]\n]);\nfinal.shift();\nreturn final;\n"

        # 変数に保存
        +store_value_3:
          action>: StoreValue
          key: s_hasso
          value: +run_script_1

        # 仕入れ館 のみ抽出
        +run_script_2:
          action>: RunScript
          code: "return s_hasso.filter(s => s[1].indexOf(\"仕入れ館\") > -1);\n"

        # 変数に保存
        +store_value_9:
          action>: StoreValue
          key: s_hasso
          value: +run_script_2

        # 真のとき  仕入館の発送ある時
        +if_10:
          if>: ${!!s_hasso[0]}
          _do:

            # 変数に保存    最新日のものを上にして実行
            +store_value_10:
              action>: StoreValue
              key: hozon
              value: ${s_hasso.reverse()}

            # 【発送登録：NE】　仕入館
            +call_custom_action_3:
              action>: CallCustomAction
              id: ca_705c6c6c2f769f9bb716
              params:
                Id_: UPS_001
                password: password
                s_hasso: ${hozon}
              meta:
                version: '2022-02-21T04:54:49.000Z'
                interface:
                  params:
                    Id_: Text
                    password: Text
                    s_hasso: Text
                  output: Anything
                  pickers:
                display:
                  id:
                    type: chip
                    label: '【発送登録：NE】　仕入館'
                    icon: build
                    imageUrl: ''
                    color: '#303F9F'

        # 変数に保存
        +store_value_4:
          action>: StoreValue
          key: y_hasso
          value: +run_script_1

        # yui のみ抽出
        +run_script_3:
          action>: RunScript
          code: "return y_hasso.filter(s => s[1].indexOf(\"yui\") > -1);\n"

        # 変数に保存
        +store_value_6:
          action>: StoreValue
          key: y_hasso
          value: +run_script_3

        # 真のとき
        +if_11:
          if>: ${!!y_hasso[0]}
          _do:

            # 変数に保存
            +store_value_11:
              action>: StoreValue
              key: hozon
              value: ${y_hasso.reverse()}

            # 【発送登録：NE】Yui
            +call_custom_action_2:
              action>: CallCustomAction
              id: ca_057843b476b3eea155a6
              params:
                mail: 'wholesale@upswell.jp'
                password: wG6pa25R
                y_hasso: ${hozon}
              meta:
                version: '2022-02-14T07:55:13.000Z'
                interface:
                  params:
                    mail: Text
                    password: Text
                    y_hasso: Text
                  output: Anything
                  pickers:
                display:
                  id:
                    type: chip
                    label: '【発送登録：NE】Yui'
                    icon: build
                    imageUrl: ''
                    color: '#1565C0'

        # 変数に保存
        +store_value_5:
          action>: StoreValue
          key: g_hasso
          value: +run_script_1

        # GiftPadのみ抽出
        +run_script_4:
          action>: RunScript
          code: "return g_hasso.filter(s => s[1].indexOf(\"GiftPad\") > -1);\n"

        # 変数に保存
        +store_value_7:
          action>: StoreValue
          key: g_hasso
          value: +run_script_4

        # 真のとき
        +if_6:
          if>: ${!!g_hasso[0]}
          _do:

            # スクリプトを実行
            +run_script_5:
              action>: RunScript
              code: "g_hasso.sort(function(a, b) {\n  if (parseFloat(a[0]) > parseFloat(b[0])) return -1;\n  if (parseFloat(a[0]) < parseFloat(b[0])) return 1;\n  return 0;\n});\nreturn g_hasso;\n"

            # 変数に保存
            +store_value_12:
              action>: StoreValue
              key: g_hasso
              value: +run_script_5

            # 【発送登録：NE】　Giftpad
            +call_custom_action_1:
              action>: CallCustomAction
              id: ca_bab5fbef67cf2d81c83f
              params:
                Id_: upswell
                password: '3-xS5E$d'
                g_hasso: ${g_hasso}
              meta:
                version: '2022-02-14T07:48:22.000Z'
                interface:
                  params:
                    Id_: Text
                    password: Text
                    g_hasso: Text
                  output: Anything
                  pickers:
                display:
                  id:
                    type: chip
                    label: '【発送登録：NE】　Giftpad'
                    icon: build
                    imageUrl: ''
                    color: '#C2185B'

# 真のとき
+if_2:
  if>: ${!NE_error}
  _do:

    # Slackでメッセージを送信
    +send_slack_message_2:
