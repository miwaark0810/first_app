# 変数に保存
+store_value_1:
  action>: StoreValue
  key: workflowId
  value: ${error.workflow.id}
  setIfNotDefined: false
  private: false

# スクリプトを実行
+run_script_1:
  action>: RunScript
  code: "const base = \"lastOperatorOn\";\nreturn base + workflowId;\n"
  private: false

# データを取得する
+data_store_get_2:
  action>: DataStoreGet
  key: +run_script_1
  private: false

# 強制終了
+kill_attempt_1:
  action>: KillAttempt
  message: ''
  private: false

# データを取得する
+data_store_get_1:
  action>: DataStoreGet
  key: latest_operator
  private: false

# 変数に保存
+store_value_2:
  action>: StoreValue
  key: latest_operator
  value: +data_store_get_1
  setIfNotDefined: false
  private: false

# 真のとき
+if_1:
  if>:
    condition: ${latest_operator == "user"}
    private: false
  _do:

    # 正常終了
    +exit_1:
      exit>:
        message: '再実行せずに終了します'
        private: false

# ワークフローを実行する
+add_to_queue_1:
  action>: AddToQueue
  workflow_id: ${workflow_id}
  private: false