# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  url: 'https://www.yahoo.co.jp/'
  lang: 'ja-JP'
  headless: true

# クリック
+click_1:
  action>: Click
  browser: +open_browser_1
  selector: ':nth-child(1) > .QLtbNZwO-lssuRUcWewbd > .yMWCYupQNdgppL-NV6sMi > ._2cXD1uC4eaOih4-zkRgqjU > .TRuzXRRZHRqbqgLUCCco9 > ._3cl937Zpn1ce8mDKd5kp7u > .fQMqQTGJTbIMxjQwZA2zk'
  confirm: true
  ignoreError: true
  timeout: 30000

# 待機する
+wait_1:
  action>: Wait
  time: 3000

# スクリーンショットを撮る
+take_screenshot_1:
  action>: TakeScreenshot
  browser: +click_1
  full_page: false
  type: png

# ブラウザを閉じる
+close_browser_1:
  action>: CloseBrowser
  browser: +click_1

# テキストを作成
+text_1:
  action>: Text
  text: test

