# マウスクリック
+mouse_click_1:
  action>: MouseClick
  display_name>: 'マウスクリック'
  button: LEFT
  count: 1
  mode: IMAGE_RECOGNITION
  target: 'data:image/png;base64,'
  windowDetectionTarget: ''
  withKey: ''
  timeout: 10000
  confidnece: 80
  waitBefore: 200
  waitAfter: 200
  private: false
  meta:
    action:
      disabled: false

# キーを押す
+keyboard_press_key_1:
  action>: KeyboardPressKey
  display_name>: 'キーを押す'
  keys: enter
  duration: 50
  repetition: 1
  delay: 50
  waitBefore: 200
  waitAfter: 200
  private: false
  meta:
    action:
      disabled: false

# 画面の変化が無くなるまで待機する
+wait_for_stable_screen_1:
  action>: WaitForStableScreen
  display_name>: '画面の変化が無くなるまで待機する'
  standstillDetectionTime: 5
  checkInterval: 1
  toleranceRate: 10
  timeout: 30
  private: false
  meta:
    action:
      disabled: false

# マウス移動
+mouse_move_1:
  action>: MouseMove
  display_name>: 'マウス移動'
  mode: IMAGE_RECOGNITION
  target: 'data:image/png;base64,'
  windowDetectionTarget: ''
  confidence: 98
  duration: 1000
  timeout: 10000
  waitBefore: '0'
  waitAfter: 200
  private: false
  meta:
    action:
      disabled: false