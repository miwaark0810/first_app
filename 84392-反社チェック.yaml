# テキストを作成_メモ（削除してください）
+text_2:
  action>: Text
  text: "【要設定】と書かれたアクションで、【】で囲まれた箇所を設定してください。\n設定が終わったら、【要設定】の文言と、このメモは削除してください。"
  private: false

# テキストを作成_標準反社チェックワード（AUTORO反社チェックアプリのネガティブワードに設定する）
+text_1:
  action>: Text
  text: '粉飾,横領,着服,背任,脱税,申告漏れ,違反,逮捕'
  private: false

# スクリプトを実行_反社チェックアプリから渡されるパラメータのログ用（配列などあるため、RunScript使用）
+run_script_1:
  action>: RunScript
  code: "return {\n  account,\n  targetKeyword,\n  negativeKeywords,\n  ticketId\n};\n"
  private: false

# 【要設定】テキストを作成_読んだら削除してください
+text_3:
  action>: Text
  text: 'データストアに、「AUTORO反社チェックAPIキー」という名前でAPIキーを登録しておいてください。'
  private: false

# データを取得する_AUTORO反社チェックAPIキー
+data_store_get_1:
  action>: DataStoreGet
  key: 'AUTORO反社チェックAPIキー'
  private: false

# 変数に保存_autoroAppApiKey
+store_value_1:
  action>: StoreValue
  key: autoroAppApiKey
  value: +data_store_get_1
  setIfNotDefined: false
  private: false

# エラーを捕捉する
+try_1:
  try>: entireError
  _do:

    # AUTORO反社チェック_Google検索ver_4.1（検索窓使用・ファイル非保存・オプションクエリ）
    +call_custom_action_1:
      action>: CallCustomAction
      id: ca_1b105107fa614fd2a0ff
      params:
        maxArticlesCount: 4
        shouldStepIntoArticlePage: ''
        targetKeyword: ${targetKeyword}
        negativeKeywords: ${negativeKeywords}
        optionQuery: ''
      meta:
        version: '2024-10-16T12:07:59.000Z'
        interface:
          params:
            maxArticlesCount: Text
            shouldStepIntoArticlePage: Boolean
            targetKeyword: Text
            negativeKeywords: Text
            optionQuery: Text
          output: Anything
          pickers:
        display:
