  action>: StoreValue
  key: key2
  value: '0'
  setIfNotDefined: false
  private: false
  meta:
    action:
      disabled: false

# 変数に保存
+store_value_5:
  action>: StoreValue
  key: key3
  value: '0'
  setIfNotDefined: false
