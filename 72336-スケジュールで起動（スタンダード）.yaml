# テキストを作成
+text_1:
  action>: Text
  text: test
  private: false

# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  url: 'https://www.yahoo.co.jp/'
  lang: 'ja-JP'
  headless: true
  confirm: true
  useShadowDomSelector: false
  private: false

# ブラウザを閉じる
+close_browser_1:
  action>: CloseBrowser
  browser: +open_browser_1
  private: false