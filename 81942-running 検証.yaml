# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  url: https://platform.sparelabs.com/366e4/analyze/launchReports
  lang: ja-JP
  headless: true
  confirm: true
  useShadowDomSelector: false
  private: false

# メールアドレス入力
+type_text_1:
  action>: TypeText
  browser: "+open_browser_1"
  selector: input[placeholder^="Email"]
  text: shunsuke.fukasawa@autoro.io
  clearValue: true
  ignoreError: true
  private: false

# ログインボタン押下
+click_1:
  action>: Click
  browser: "+type_text_1"
  selector: button[name^="login"]
  confirm: true
  ignoreError: true
  timeout: 30000
  private: false

# パスワード入力
+type_password_1:
  action>: TypePassword
  browser: "+click_1"
  selector: input[placeholder^="Password"]
  password: "********"
  ignoreError: true
  private: false

# テキストを作成
+text_1:
  action>: Text
  text: 終わり
  private: false