# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  url: 'https://2captcha.com/demo/normal'
  lang: 'ja-JP'
  headless: true

# CAPTCHAを解決
+solve_captcha_1:
  action>: SolveCaptcha
  browser: +open_browser_1
  type: normal
  selector: '._17bwEOs9gv8ZKqqYcEnMuQ'
  executeCallback: false

# 文字入力
+type_text_1:
  action>: TypeText
  browser: +open_browser_1
  selector: '#simple-captcha-field'
  text: +solve_captcha_1
  clearValue: false
  ignoreError: true

# クリック
+click_1:
  action>: Click
  browser: +type_text_1
  selector: '._2iYm2u0v9LWjjsuiyfKsv4'
  confirm: true
  ignoreError: true
  timeout: 30000