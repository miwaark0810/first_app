# ブラウザを開く
+open_browser_1:
  action>: OpenBrowser
  url: 'https://www.yahoo.co.jp/'
  lang: 'ja-JP'
  headless: true
  confirm: true
  useShadowDomSelector: false
  private: false

# クリック
+click_1:
  action>: Click
  browser: +open_browser_1
  selector: '._2j0udhv5jERZtYzddeDwcv:nth-child(1) ._1alzSpTqJzvSVUWqpx82d4'
  confirm: true
  ignoreError: true
  timeout: 30000
  private: false

# ブラウザを閉じる
+close_browser_1:
  action>: CloseBrowser
  browser: +click_1
  private: false