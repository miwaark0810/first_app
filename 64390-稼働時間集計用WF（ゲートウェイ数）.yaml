# ゲートウェイ数シート取得
+get_spreadsheet_1:
  action>: GetSpreadsheet
  provider: gsheet_846866b1bb4e685cf58c
  spreadsheet_id: 1ObhKZ8IxBPx7bL3L_hhWyjx4CPLcySw6hGxE1PEWHqE
  private: false
  meta:
    display:
      provider:
        type: chip
        label: 'Google Spreadsheet (ayumu.niwa@tutorial.co.jp)'
        icon: googlespreadsheet
      spreadsheet_id:
        label: 'ゲートウェイ数'
        icon: text
        type: chip

# 組織＋VPN数
+get_cells_1:
  action>: GetCells
  spreadsheet: +get_spreadsheet_1
  range: 'A:C'
  findAll: false
  private: false

# 組織ID、組織名、VPN数の配列
+store_value_1:
  action>: StoreValue
  key: VPNArr
  value: +get_cells_1
  private: false

# 組織id のみの配列作成
+run_script_2:
  action>: RunScript
  code: "let ids = [];\nfor (let el of VPNArr) {\n  ids.push(el[0]);\n}\nids.shift();\nreturn ids;\n"
  private: false

# VPNシートに存在する組織のid
+store_value_5:
  action>: StoreValue
  key: execOrganizationIds
  value: +run_script_2
  private: false

# まとめシート
+get_spreadsheet_2:
  action>: GetSpreadsheet
  provider: gsheet_846866b1bb4e685cf58c
  spreadsheet_id: 1EgtZv3G1pXykwBSZbf1dTPTNvk7DwSq2CtEGAn7XGyE
  private: false
  meta:
    display:
      provider:
        type: chip
        label: 'Google Spreadsheet (ayumu.niwa@tutorial.co.jp)'
        icon: googlespreadsheet
      spreadsheet_id:
        label: '利用状況集計（2023.09）'
        icon: text
        type: chip

# まとめシートのヘッダーを更新
+update_cells_2:
  action>: UpdateCells
  spreadsheet: +get_spreadsheet_2
  range: 'シート1!K1'
  values: 'ゲートウェイ数'
  private: false

# まとめシートの組織id
+get_cells_2:
  action>: GetCells
  spreadsheet: +get_spreadsheet_2
  range: 'シート1!A:A'
  findAll: false
  private: false

# 全ての組織ids
+store_value_4:
  action>: StoreValue
  key: organizationIds
  value: +get_cells_2
  private: false

# idのみの配列作成
+run_script_5:
  action>: RunScript
  code: "let flatArr = organizationIds.flat();\nflatArr.shift();\nreturn flatArr;\n"
  private: false

# idのみの配列
+store_value_8:
  action>: StoreValue
  key: AllOrganizationIds
  value: +run_script_5
  private: false

# 全ての組織idを繰り返す
+for_each_2:
  for_each>:
    id: ${AllOrganizationIds}
    withIndex: index
  _do:

    # ゲートウェイ数シートの組織idの配列の何番目にidが存在するか確認（存在しない場合-1）
    +run_script_4:
      action>: RunScript
      code: "return execOrganizationIds.indexOf(id);\n"
      private: false

    # ゲートウェイ数シートの組織idの配列内のインデックス（存在しない場合-1）
    +store_value_10:
      action>: StoreValue
      key: isExistIndex
      value: +run_script_4
      private: false

    # セルを書き換える値（デフォルト：０）
    +store_value_11:
      action>: StoreValue
      key: value
      value: '0'
      private: false

    # VPN組織id の中に組織idが存在するとき
    +if_2:
      if>: ${isExistIndex >= 0}
      _do:

        # VPNArr の中のindex
        +store_value_12:
          action>: StoreValue
          key: execIndex
          value: ${isExistIndex + 1}
          private: false

        # VPNArr の中から値を抜き出す
        +store_value_13:
          action>: StoreValue
          key: value
          value: ${VPNArr[execIndex][2]}
          private: false

    # 更新するシート＋セル
    +text_1:
      action>: Text
      text: 'シート1!K${index + 2}'
      private: false

    # 待機する
    +wait_1:
      action>: Wait
      time: 500
      private: false

    # セルの値を更新
    +update_cells_1:
      action>: UpdateCells
      spreadsheet: +get_spreadsheet_2
      range: +text_1
      values: ${value}
      private: false