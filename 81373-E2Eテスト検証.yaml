# ログインボタンをクリック
+click_1:
  action>: Click
  browser: "+open_browser_1"
  selector: "#app > div > div > div > div > div.card__text.pt-0 > form > div.layout.justify-center
    > div > button"
  confirm: true
  ignoreError: true
  timeout: 30000
  private: false

# 待機する
+wait_1:
  action>: Wait
  time: 5000
  private: false

# スクレイピング
+scrape_page_1:
  action>: ScrapePage
  browser: "+click_1"
  selector: "#inspire > div.application--wrap > div > main > div > div > div.view
    > div > div:nth-child(3) > ul > li > div > div"
  text_only: true
  ignoreError: true
  private: false

# 変数に保存
+store_value_1:
  action>: StoreValue
  key: list
  value: "+scrape_page_1"
  setIfNotDefined: false
  private: false

# スクリプトを実行
+run_script_1:
  action>: RunScript
  code: |
    const data = list[0];

    function parseProjectData(data) {
      // プロジェクトごとにデータを分割し、作成日の行を除去
      const blocks = data
        .trim()
        .split("\n\n")
        .map(block => block.split("\n"))
        .filter(array => !array[0].startsWith("作成日"));

      const projectList = [];

      // 各ブロックを処理
      blocks.forEach(projectData => {
        const icon = projectData[0]; // アイコン
        const name = projectData[1]; // プロジェクト名
        let description = null;
        let organization = null;

        // 説明があるかどうかを判断
        if (projectData.length === 3) {
          organization = projectData[2]; // 組織名のみ
        } else if (projectData.length === 4) {
          description = projectData[2]; // 説明
          organization = projectData[3]; // 組織名
        }

        // プロジェクト情報を整形
        projectList.push({
          icon,
          name,
          description: description || null,
          organization
        });
      });

      return projectList;
    }

    const formattedData = parseProjectData(data);
    return formattedData;
  private: false

# 変数に保存
+store_value_2:
  action>: StoreValue
  key: test
  value: "+run_script_1"
  setIfNotDefined: false
  private: false

# スクリプトを実行
+run_script_2:
  action>: RunScript
  code: 'return test[test.length - 1].name;

    '
  private: false