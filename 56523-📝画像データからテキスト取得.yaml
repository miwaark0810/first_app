# ブラウザを開く_株式会社チュートリアルのHPを開く
+open_browser_1:
  action>: OpenBrowser
  url: 'https://tutorial.co.jp/'
  lang: 'ja-JP'
  headless: true

# 要素のスクリーンショットを撮る_画像を取得する
+take_element_shot_1:
  action>: TakeElementShot
  browser: +open_browser_1
  selector: 'section.module-cover.parallax.text-center.fullscreen > div.container > div'
  type: png
  ignoreError: false

# 画像からテキストを検出する
+text_detection_1:
  action>: TextDetection
  image: +take_element_shot_1
  mode: document
  text_only: true

# 検索して置換_改行を除いて文章を整える
+replace_text_1:
  action>: ReplaceText
  text: +text_detection_1
  find: '\n'
  use_regex: true
  replace_with: ''