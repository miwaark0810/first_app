# ファイルを取得
+get_file_1:
  action>: GetFile
  provider: box_a42c91f267212de0bf0c
  filename: 1591676272490
  private: false
  meta:
    display:
      provider:
        type: chip
        label: 'Box (kaihatsu@robokura.com)'
        icon: box
      filename:
        label: '×【虎に翼】第16週白本原稿79.docx'
        icon: text
        type: chip

# ファイルをBase64でエンコードする
+encode_file_to_base64_1:
  action>: EncodeFileToBase64
  filepath: +get_file_1
  private: false

# 原稿解析関数
+call_learned_model_1:
  action>: CallLearnedModel
  id: 8
  params:
    word_base64: +encode_file_to_base64_1
    scene_specific_string: '数字'
    title_specific_string: 'Ｔ'
    stage_direction_specific_string: 'スペース'
  meta:
    interface:
      params:
        base64に変換したWord: Text
        場面の特定文字: Text
        タイトルの特定文字: Text
        ト書きの特定文字: Text
    display:
      id:
        type: chip
        label: '原稿解析関数'
        icon: build
        color: '#0097A7'

# 台本整形関数
+call_learned_model_2:
  action>: CallLearnedModel
  id: 9
  params:
    script_json: +call_learned_model_1
    stories_number: 80
    character_name_separator: '・'
    paragraphs_per_page: 17
    response_type: arraybuffer
    filename: '台本（虎に翼）79.docx'
  meta:
    interface:
      params:
        台本の行オブジェクト配列: List
        話数: Number
        人物名区切り文字: Text
        1ページごとの段落数: Number
        レスポンスの形式: Text
        ファイル名: Text
    display:
      id:
        type: chip
        label: '台本整形関数'
        icon: build
        color: '#0097A7'

# ファイルを保存
+save_file_1:
  action>: SaveFile
  provider: box_a42c91f267212de0bf0c
  filename: +call_learned_model_2
  directory: 274082922369
  createPath: false
  private: false
  meta:
    display:
      provider:
        type: chip
        label: 'Box (kaihatsu@robokura.com)'
        icon: box
      directory:
        label: '完成台本'
        icon: folder
        type: chip