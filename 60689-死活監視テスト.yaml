# 繰り返し
+loop_1:
  loop>: 100
  _do:

    # ブラウザを開く
    +open_browser_1:
      action>: OpenBrowser
      url: 'https://sample-img.lb-product.com/1gb/'
      lang: 'ja-JP'
      headless: true
      useShadowDomSelector: false
      private: false

    # クリック
    +click_1:
      action>: Click
      browser: +open_browser_1
      selector: '.center:nth-child(2) .btn'
      confirm: true
      ignoreError: true
      timeout: 30000
      private: false

    # ダウンロード完了を待つ
    +wait_for_download_1:
      action>: WaitForDownload
      private: false

    # ダウンロードファイル一覧
    +get_download_files_1:
      action>: GetDownloadFiles
      order: ASC
      sort_by: FILENAME
      private: false